services:
  transactions-db:
    build:
      context: ./docker/postgres-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SOURCE_DB_USER}
      - POSTGRES_PASSWORD=${SOURCE_DB_PASSWORD}
      - POSTGRES_DB=${SOURCE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-scripts/initialize_db_ddl.sql:/docker-entrypoint-initdb.d/initialize_db_ddl.sql:ro
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "hot_standby=on"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_DB_USER} -d ${SOURCE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${SOURCE_DB_USER}:${SOURCE_DB_PASSWORD}@transactions-db:5432/${SOURCE_DB}
      - SOURCE_DB_HOST=transactions-db
      - DEST_DB_HOST=transactions-db
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
    entrypoint: ["/entrypoint.sh"]
    stdin_open: true
    tty: true

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.9
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --memory 1G
      - --reserve-memory 0M
      - --smp 1
      - --overprovisioned
      - --mode dev-container
      - --default-log-level=info
      - --set redpanda.auto_create_topics_enabled=true
      - --set redpanda.default_topic_partitions=1
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "9092:9092"
      - "18081:18081"
      - "18082:18082"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  connect:
    image: debezium/connect:3.0.0.Final
    container_name: connect
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: redpanda:29092
      GROUP_ID: connectors-group
      CONFIG_STORAGE_TOPIC: _connectors_configs
      OFFSET_STORAGE_TOPIC: _connectors_offsets
      STATUS_STORAGE_TOPIC: _connectors_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      HEAP_OPTS: -Xms512M -Xmx512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      redpanda:
        condition: service_healthy
      transactions-db:
        condition: service_healthy

  console:
    image: docker.redpanda.com/redpandadata/console:v3.1.0
    container_name: console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        kafkaConnect:
          enabled: true
          clusters:
            - name: connect
              url: http://connect:8083
    ports:
      - "8087:8080"
    depends_on:
      - redpanda

  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:25.12.5.44-alpine
    container_name: clickhouse-keeper
    hostname: clickhouse-keeper
    restart: unless-stopped
    volumes:
      - clickhouse_keeper_data:/var/lib/clickhouse
      - ./clickhouse/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml
    ports:
      - "9181:9181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 9181 | grep -q imok"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:25.12.5.44
    container_name: clickhouse
    hostname: clickhouse
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./clickhouse/kafka.xml:/etc/clickhouse-server/config.d/kafka.xml
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  connect-init:
    image: curlimages/curl:8.18.0
    container_name: connect-init
    volumes:
      - ./connector-configs/postgres-source.json:/config/postgres-source.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Kafka Connect to be ready..."
        until curl -sf http://connect:8083/connectors; do
          sleep 2
        done
        echo "Kafka Connect is ready. Registering connectors..."
        curl -s -X POST http://connect:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/config/postgres-source.json
        echo ""
        echo "Connector registered."
    depends_on:
      connect:
        condition: service_healthy
    restart: "no"

  clickhouse-init:
    image: clickhouse/clickhouse-server:25.12.5.44
    container_name: clickhouse-init
    volumes:
      - ./clickhouse/sql:/sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for f in /sql/*.sql; do
          echo "Running $$(basename $$f) ..."
          clickhouse-client --host clickhouse --multiquery < $$f
          echo " OK"
        done
        echo "ClickHouse initialization complete."
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./api
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  postgres_data:
  redpanda_data:
  clickhouse_data:
  clickhouse_logs:
  clickhouse_keeper_data: